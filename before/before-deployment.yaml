apiVersion: apps/v1
kind: Deployment
metadata:
  name: before-api
  namespace: flask-apps
spec:
  replicas: 2  # Run 2 copies for reliability
  selector:
    matchLabels:
      app: before-api
  template:
    metadata:
      labels:
        app: before-api
    spec:
      containers:
      - name: before-api
        # This is where your Docker image lives
        image: swr.cn-north-4.myhuaweicloud.com/your-namespace/before-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000  # Flask's default port
        # Mount the config file
        volumeMounts:
        - name: config-volume
          mountPath: /app/.env
          subPath: .env
        # Resource limits - like giving your app a budget
        resources:
          requests:  # Minimum guaranteed
            memory: "256Mi"  # 256 MB
            cpu: "250m"      # 1/4 of a CPU
          limits:     # Maximum allowed
            memory: "512Mi"   # 512 MB
            cpu: "500m"       # 1/2 of a CPU
        # Health checks
        livenessProbe:  # Is the app alive?
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:  # Is the app ready for traffic?
          httpGet:
            path: /ready
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config-volume
        configMap:
          name: before-api-config
---
# Service - this gives your app an address
apiVersion: v1
kind: Service
metadata:
  name: before-api-service
  namespace: flask-apps
spec:
  selector:
    app: before-api
  ports:
  - port: 80        # External port
    targetPort: 5000 # Internal port (your Flask app)
  type: ClusterIP